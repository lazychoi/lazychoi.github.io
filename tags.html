---
layout: default
---

<div class="potal-list">
{% for tag in site.tags %}  
	<li><h2>{{ tag | first }}</h2>
    <ul>
    {% for posts in tag %}
      {% for post in posts %}
      	{% if post.url %}
	        <li><a href="{{ post.url }}">{{ post.title }}</a></li>
	    {% endif %}
      {% endfor %}
    {% endfor %}
    </ul>
  </li>
{% endfor %}
</div>
