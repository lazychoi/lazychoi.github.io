<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>용어 추가 및 관리</title>
  <link rel="stylesheet" href="common.css">
  <link rel="stylesheet" href="farm_styles.css?v=2">
  <!-- KaTeX for rendering LaTeX math formulas in real-time -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
  <!-- marked.js for rendering markdown -->
  <script src="marked.min.js"></script>
</head>

<body>
  <div class="admin-container">
    <h1>용어 추가 및 관리 (로컬)</h1>

    <!-- 2단계: 용어 입력 폼 -->
    <div class="form-grid">
      <div class="form-group">
        <label for="inputTerm">표제어 (필수)</label>
        <input type="text" id="inputTerm" placeholder="예: 1차광물">
      </div>
      <div class="form-group">
        <label for="inputForeign">외래어 (선택)</label>
        <input type="text" id="inputForeign" placeholder="예: primary mineral">
      </div>
      <div class="form-group">
        <label for="inputEasy">쉬운용어 (선택)</label>
        <input type="text" id="inputEasy" placeholder="예: 첫째광물">
      </div>
      <div class="form-group full-width">
        <label for="inputMeaning">설명 및 내용 (선택)</label>
        <textarea id="inputMeaning" rows="4" placeholder="용어의 설명글을 입력하세요. 수식은 $ ... $ 또는 $$ ... $$로 입력하시고, 이미지는 [[파일명.jpg]] 형식으로 적어주세요."></textarea>
      </div>
    </div>

    <div class="button-group">
      <button id="btnSubmit" class="btn btn-primary">
        ➕ 용어 추가하기
      </button>
      <button id="btnCancelEdit" class="btn btn-danger" style="display: none;">
        취소
      </button>
    </div>

    <!-- 3단계: 실시간 미리보기 -->
    <div class="preview-container">
      <div class="preview-title">실시간 카드 미리보기</div>
      <ul id="results" style="margin-top: 0; display: block;">
        <li id="previewCard">
          <span class="term">표제어</span>
          <div class="meaning">용어의 설명이 이곳에 표시됩니다.</div>
        </li>
      </ul>
    </div>

    <!-- 4단계: 전체 용어 목록 및 관리 -->
    <div class="manager-section">
      <h2>전체 용어 목록 및 관리 <span id="searchCount" class="search-count"></span></h2>
      
      <!-- 표제어(필수) 입력란과 동기화되어 검색되므로, 검색 박스는 화면에서 숨김 처리합니다. -->
      <div class="search-bar-container" style="display: none;">
        <input type="text" id="inputSearch" placeholder="표제어로 검색하세요...">
        <button id="btnClearSearch" class="btn-clear-search" title="검색어 지우기" style="display: none;">&times;</button>
      </div>

      <div class="table-wrapper">
        <table class="terms-table">
          <thead>
            <tr>
              <th style="width: 25%">표제어</th>
              <th style="width: 25%">쉬운용어 / 외래어</th>
              <th style="width: 35%">설명 미리보기</th>
              <th style="width: 15%">관리</th>
            </tr>
          </thead>
          <tbody id="termsTableBody">
            <tr>
              <td colspan="4" style="text-align: center; color: var(--text-muted);">
                데이터 파일을 로드하면 전체 용어 목록이 표시됩니다.
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="farm_add.js?v=2"></script>
</body>

</html>
