        // 전체 데이터에서 출제 문제 뽑기
        function randomQuestion(){
            //데이터 개수만큼 연속된 숫자를 가진 배열 변수 만들어 무작위로 섞기
            var numbers = [];
            data.forEach(function(element){
                numbers.push(element.index-1);
            });
            var shuffleNumbers = [];
            while(numbers.length > 0){
                var temp = numbers.splice(Math.floor(Math.random()*numbers.length), 1)[0];
                shuffleNumbers.push(temp);
            }

            //문제 유형 개수 저장
            var tempOx = 0;
            var tempBlank = 0;

            // 출제 문제 저장
            var result = [];
            var i = 0;
            while(result.length < questionNums){
                if(data[shuffleNumbers[i]].questionType === 'ox' && tempOx < oxNums) {
                    result.push(data[shuffleNumbers[i]]);
                    tempOx+=1;
                } else if (data[shuffleNumbers[i]].questionType === 'blank' && tempBlank < blankNums){
                    result.push(data[shuffleNumbers[i]]);
                    tempBlank+=1;
                }
                i++;
            }
            return result;
        }

        function buildQuiz(){
            //기존 문제, 정답 지우기
            questions = [];
            answers = [];

            // 출제 문제 무작위 추출
            questions = randomQuestion();

            // 문제를 HTML로 변환
            var questionsHtml = [];

            // 문제 객체의 각 문제에 사용자 응답을 받을 텍스트박스 추가. currentQuestion은 문제, questionNumber은 배열의 요소번호
            questions.forEach(function(currentQuestion, questionNumber){
                //정답 변수에 입력
                answers.push(currentQuestion.correctAnswer);

                //문제 유형 확인
                if(currentQuestion.questionType == 'ox') {
                    //각 문제에 붙일 사용자 응답 저장 변수
                    var answer = `<div  class="ox">
                    <input type="radio" id="ox${questionNumber}o" name="ox${questionNumber}" value="o"><label for="ox${questionNumber}o" style=cursor:pointer>예</label>
                    <input type="radio" id="ox${questionNumber}x" name="ox${questionNumber}" value="x"><label for="ox${questionNumber}x" style=cursor:pointer>아니오</label>
                    </div>`;
    
                    // 문제와 사용자 응답 박스 붙이기
                    questionsHtml.push(`
                    <div class="question" id="question${questionNumber}">${questionNumber+1}. ${currentQuestion.question}</div>
                    <div class="answer">${answer}</div>
                    `);
                } else if(currentQuestion.questionType == 'blank') {
                    var answer = `<input type="text" name="blank${questionNumber}">`;
                    questionsHtml.push(`
                    <div class="question" id="question${questionNumber}">${questionNumber+1}. ${currentQuestion.question.replace('( )', '(&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;)')}</div>
                    <div class="answer">${answer}</div>
                    `);
                };
            });
            quizContainer.innerHTML = questionsHtml.join('');

            resultsContainer.style.visibility = "hidden";
            reloadButton.style.visibility = "hidden";
            
            // 타이머 실행
            startTimer();
            // console.log('문제',questions);
            // console.log('정답',answers);
        }

        // 사용자 응답 처리 = 결과 표시

            //사용자 응답 저장
            for(var i = 0; i < questionNums; i++ ){
                //answer 클래스 내의 코드 하나씩 가져오기

                    var radioBtn = document.getElementsByName('ox'+i);

                    for(var j=0; j < radioBtn.length; j++){
                        if(radioBtn[j].checked){
                            var temp = radioBtn[j].value
                        }
                    }
                    //사용자가 응답하지 않으면
                    if(temp === ''){
                        userAnswers.push('');
                    } else {
                        userAnswers.push(temp);
                    }
                } else if(answerContainer.querySelector('input[name=blank'+i+']')){
                    userAnswers.push((answerContainer.querySelector('input[name=blank'+i+']') || {}).value);
                }
            }

            // 채점
            for(var k=0; k < answers.length; k++){
                var questionIndex = questions[k].index;
                if(answers[k].replace(/(\s*)/g,"")===userAnswers[k].replace(/(\s*)/g,"")){
                    correctNums++;
                    data[questionIndex].tested += 1;
                    data[questionIndex].corrected += 1;
                } else {
                    document.getElementById("question"+k).style.color = 'red';
                    data[questionIndex].tested += 1;
                }
            console.log(data[questionIndex].index,'번 출제횟수', data[questionIndex].tested);
            console.log(data[questionIndex].index,'번 맞춘횟수', data[questionIndex].corrected);
            }

            // 점수와 정답 표시
            displayResult = `<div>${questions.length}문제 중 <span class="red">${correctNums}문제 </span> 맞췄습니다.</div>
                <div class="correctAns"><ul>`
                for(var l=0; l < answers.length; l++){
                    displayResult = displayResult + `<li>${l+1}번 정답 : ${answers[l]}</li>`;
                }
            displayResult = displayResult + '</ul></div>'
            resultsContainer.innerHTML = displayResult;
            resultsContainer.style.visibility = "visible";
            // 다시 풀기
            reloadButton.style.visibility = "visible";
        }

        // 타이머
        var time;   //현재 시간
        var timer;  //타이머

        // 타이머 시간 설정 - 초단위
        var setTime = 120;


        // 1초마다 countdown함수 실행
        function startTimer(){ 
            time = setTime;      
            timer = setInterval("countdown()", 1000); 
        }

        function countdown(){
            var displayTimer = document.getElementById('timer');
            
            var min = Math.floor(time / 60);
            var sec = time - min*60;

            if( min < 10 ){ min = "0" + min; }
            if( sec < 10 ){ sec = "0" + sec; }
            var questionsHtml = min + ":" + sec;

            if ( time > 0 ) time--;
            else { 
                clearInterval(timer); 
                alert('시험이 종료되었습니다.');
                time = setTime;
            }

            displayTimer.textContent = questionsHtml;
        }

        // 퀴즈 실행
        buildQuiz();
        submitButton.addEventListener('click', showResults);
        reloadButton.addEventListener('click', buildQuiz);

    </script>
</body>
</html>
