---
layout: default
---

<h2>{{page.title}}</h2>
<table class="table table-striped">
  <tbody>
	{% for post in site.posts %}	
	{% for tag in post.tags %}
	{% if tag == page.tag %}
	<tr>
	  <td>
		<strong><a href="{{ post.url }}">{{ post.title }}</a></strong>
		</br>
		- <small>{{ post.date | date: "%Y. %m. %d." }}</small>
	  </td>
	</tr>
	<tr><td></td></tr>
	{% endif %}
	{% endfor %}
	{% endfor %}			
  </tbody>
</table>
