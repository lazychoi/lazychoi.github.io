        button{

            background-color: #279;

            border-radius: 3px;
            padding: 10px;
            cursor: pointer;

        }
        button#reload{

        }
        button#reload:hover{
            background-color: rgb(238, 114, 13);
        }
        #results{
            font-size: 30px;
            font-weight: bold;
            color: red;
        }
        #results, #reload{
            visibility: hidden;
        }

        // 전체 데이터에서 출제 문제 뽑기
        function randomQuestion(data, numQuestion){
            // 출제 문제 저장
            var result = [];
            
            for(var  i=0; i < numQuestion; i++){
                // 데이터 크기 내에서 무작위 숫자를 뽑아 해당 요소를 저장
                var randomNum = Math.floor(Math.random() * data.length);
                // console.log(randomNum);
                result[i] = data[randomNum];
                // console.log(result[i]);
                //중복 검사
                for(var  j=0; j < i; j++){
                    if(result[j]==result[i]){
                        i--;
                        break;
                    }
                }
            }
            return result;
        }
        
        
        // UI를 변수로
        var quizContainer = document.getElementById("quiz");
        var resultsContainer = document.getElementById("results");
        var submitButton = document.getElementById("submit");        
        var reloadButton = document.getElementById("reload");
        
        
        // 출제 문제 개수
        var numQuestion = 4;
        
        // 문제 저장 변수
        var myQuestions = [];
        
        function buildQuiz(){
            // 출제 문제 무작위 추출
            myQuestions = randomQuestion(data, numQuestion);
            
            // 3문제를 저장할 변수
            var output = [];

            // 문제 객체의 각 문제에 사용자 응답을 받을 텍스트박스 추가
            myQuestions.forEach(function(currentQuestion, questionNumber){

                //각 문제에 붙일 사용자 응답 저장 변수
                var answer = `
                <input type="text" name="question${questionNumber}">
                `;

                // 문제와 사용자 응답 박스 붙이기
                output.push(`
                <div class="question" id="question${questionNumber}">${questionNumber+1}. ${currentQuestion.question}</div>
                <div class="answer">${answer}</div>
                `);
            });
            quizContainer.innerHTML = output.join('');

            resultsContainer.style.visibility = "hidden";
            reloadButton.style.visibility = "hidden";
        }


        // 사용자 응답 처리 = 결과 표시
        function showResults(){

            // 사용자 응답 저장
            var answerContainers = quizContainer.querySelectorAll('.answer');
            // 확인
            // answerContainers.forEach((a,b)=>{
            //     console.log(a);
            // })

            // 정답 개수
            var numCorrect = 0;
            var correctAnswers = [];
            var score;

            myQuestions.forEach(function(currentQuestion, questionNumber){
                // 문제별 사용자 응답
                var answerContainer = answerContainers[questionNumber];
                var selector = 'input[name=question'+questionNumber+']';
                var userAnswer = (answerContainer.querySelector(selector) || {}).value;

                // 정답 여부 체크
                if(userAnswer.replace(/(\s*)/g,"")===currentQuestion.correctAnswer.replace(/(\s*)/g,"")){
                    // add to the number of correct answers
                    numCorrect++;
                    correctAnswers.push(currentQuestion.correctAnswer);
                } else {
                    document.getElementById("question"+questionNumber).style.color = 'red';
                    correctAnswers.push(currentQuestion.correctAnswer);
                }
            });

            // 점수와 정답 표시
            score = `<div>${myQuestions.length}문제 중 ${numCorrect}문제 맞췄습니다.</div><br>`
            for(var k=0; k < correctAnswers.length; k++){
                score = score + `<div>${k+1}번 정답 : ${correctAnswers[k]}</div>`;
            }
            resultsContainer.innerHTML = score;
            resultsContainer.style.visibility = "visible";
            reloadButton.style.visibility = "visible";
            // 다시 풀기
            
        }


        // 퀴즈 실행
        buildQuiz();
        submitButton.addEventListener('click', showResults);
        reloadButton.addEventListener('click', buildQuiz);
