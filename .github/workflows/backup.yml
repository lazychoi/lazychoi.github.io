name: Supabase Auto Backup

on:
  schedule:
    - cron: '0 15 * * *' # Runs daily at 15:00 UTC (12:00 AM KST)
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

permissions:
  contents: write # Grants permission to commit changes back to the repo

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run backup script
        run: python backup_supabase.py

      - name: Commit and push backup files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/backup-terms.json data/backup-history.json
          # Only commit and push if there are changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: automatic database backup" && git push)
