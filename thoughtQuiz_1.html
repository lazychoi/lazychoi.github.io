    <title>윤리와사상 퀴즈</title>
    <style>
        /* Variables */
        :root {
            --main-accent: #fc575e;
            --light-accent-color: #f0f1f5;
            --dark-accent-color: #279;
            --main-gray: #555;
        }
        *{
            margin: 0;
            padding: 0;
            font-family: 나눔고딕, Arial, Helvetica, sans-serif;
            box-sizing: border-box;
        }
        /* Global */
        body { background-color: var(--light-accent-color);}
        a { text-decoration: none; }
        a:hover { cursor: pointer; }

        /* 가운데 정렬 */
        @media screen and (max-width: 721px){
            .container { 
                width: 80%; 
                margin: 0 auto; 
                display: flex;
                flex-direction: column;
            }
            .box {
                width: 100%;
                margin: 0 auto;
                position: relative;
            }
        }    
            .container { 
                width: 80%; 
                margin: 0 auto; 
                display: flex;
                justify-content: stretch;
            }
            .box {
                width: 100%;
                flex: 1;
                margin: 0 auto;
                position: relative;
            }

        /* TITLE */
        h1{
            width: 100%;
            font-size: 25px;
            font-weight: bold;
            padding: 10px;
            background-color:var(--main-gray);
            color:var(--light-accent-color);
        }
        /* QUESTIONS */
        .qaSet{
            background-color: var(--light-accent-color);
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 10px;
        }
        .question{
            font-weight: bold;
            font-size: 20px;
            margin-left: 10px;
            line-height: 160%;
            text-indent: -1.2em;
        }
        input[type=text], select {
            display: inline-block;
            font-size: 15px;
            width: 80%;
            padding: 12px 20px;
            margin: 5px 0;
            border: 1px solid var(--main-gray);
            border-radius: 5px;
        }
        .ox {
            display: flex;
        }
        .ox > label {
            width: 40%;
            margin: 0px 10px;
            font-size: 17px;
            font-weight: bold;
            background-color: lightgray;
            padding: 10px;
            border-radius: 5px;
        }
        .ox > input[type="radio"]{ 
            display: none;
        }
        .ox > input[type="radio"]:checked + label {
            display: inline-block;
            width: 40%;
            margin: 0px 10px;
            font-size: 17px;
            background-color: var(--main-accent);
            color: var(--light-accent-color);
            padding: 10px;
            border-radius: 5px;
        }

        /* BUTTONS */
        .button{
            font-size: 20px;
            width: 120px;
            background-color: var(--dark-accent-color);
            color: var(--light-accent-color);
            border: 0px;
            border-radius: 3px;
            padding: 10px;
            cursor: pointer;
            margin: 20px;
        }
        .button:hover{
            background-color: #38a;
        }
        .button#reload{
            background-color: orange;
        }
        .button#reload:hover{
            background-color: rgb(238, 114, 13);
        }

        #reload{
            position: absolute;
            top: 5px;
            left: 5px;
        }

        /* 점수와 정답 */
        #results{
            color: var(--light-accent-color);
            background-color: var(--main-gray);
            border-radius: 5px;
        }
        .point{
            font-size: 25px;
            font-weight: bold;
            text-align: center;
            padding: 10px;
            background-color: var(--main-accent);
            color: var(--light-accent-color);
            border-radius: 5px 5px 0px 0px;
        }
        .correctAns{
            font-size: 20px;
            display: inline-block;
            line-height: 160%;
            margin: 10px 20px;
        }
        .red{
            color:var(--main-accent);
        }
        #results, #reload{
            visibility: hidden;
        }
        ul{
            list-style: none;
        }

        #timer {
            display: inline-block;
            background-color: var(--main-accent);
            color:white;
            padding: 0px 10px;
            margin-left: 20px;
        }
        hr { width: 98%; margin: 0 auto; color: var(--light-accent-color);}
    </style>
</head>

            questions.forEach(function(questionsObject, index){
                //정답 변수에 입력
                if(questionsObject.correctAnswer.indexOf(';') === -1){            // 정답이 여러 개면
                    answers.push(questionsObject.correctAnswer.toUpperCase());
                } else {
                    var tmpAn = [];
                    tmpAn.push(questionsObject.correctAnswer.toUpperCase().split(';'));
                    answers.push(tmpAn);

            displayResult = displayResult + `<div class="correctAns"><ul>`;
            explanation.forEach(function(element, index){
                if(element != ""){
                    displayResult = displayResult + `<li>[${index+1}번 해설] ${element}</li>`;
                }
            })
            displayResult = displayResult + '</ul></div>'

            // 점수, 정답, 해설 모두 표시
            resultsContainer.innerHTML = displayResult;
            resultsContainer.style.visibility = "visible";
            // 다시 풀기
            reloadButton.style.visibility = "visible";
            submitButton.style.visibility = "hidden";

            saveResult(rightNum, wrongNum);
        }

        var setTime = 90;


        // 1초마다 countdown함수 실행
        function startTimer(){ 
            time = setTime;      
            timer = setInterval("countdown()", 1000); 
        }

        function countdown(){
            var displayTimer = document.getElementById('timer');
            
            var min = Math.floor(time / 60);
            var sec = time - min*60;

            if( min < 10 ){ min = "0" + min; }
            if( sec < 10 ){ sec = "0" + sec; }
            var questionsHtml = min + ":" + sec;

            if ( time > 0 ) time--;
            else { 
                clearInterval(timer); 
                alert('시험이 종료되었습니다.');
                time = setTime;
                showResults();
            }

            displayTimer.textContent = questionsHtml;
        }
